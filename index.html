<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information Form</title>
   
</head>
<style>
    body{
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        background-color: bisque;
        margin: 0;
        padding: 0;
        text-align: center;

    }
 
    form {
       
        margin: auto;
        background-color: aliceblue;
        padding: 20px;
        border: 1px solid black;
        border-radius: 5px;
        


    }
    .container {
        width: 750px;
        
        
        margin: 50px auto;
        padding: 20px;
       
    }
    .header1 {
        text-align: center;

    }
   

</style>
<body >
    
        <div class="header1">
        <h1 >Student Information Form</h1> </div>
        <hr>
       <div class="container" style="text-align: center;">
        <form action="#"  style="text-align: center;">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required> <br><br>

            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required> <br><br>

        

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required> <br><br>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone"> <br>

            <label for="address" >Address:</label>
            <textarea id="address" name="address" rows="3" ></textarea> <br><br>

            <label for="parent">Parent/Guardian Name:</label>
            <input type="text" id="parent" name="parent"> <br><br>

            <label for="emergency">Emergency Contact:</label>
            <input type="tel" id="emergency" name="emergency"> <br><br>

            <button type="submit">Submit</button> 
            <button type="reset">Reset</button>
        </form>
    </div>
</body>
</html>
